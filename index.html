<!DOCTYPE html>

<html>
  <body>
    <button onclick="function1()">kill</button>

    <img src="https://www.lamborghini.com/sites/it-en/files/DAM/lamborghini/facelift_2019/model_detail/menu/09_09/menu_asterion.png" height="100" width="100" id="image">
    <img src="https://png.pngtree.com/png-vector/20190621/ourmid/pngtree-human-pose-icon-graphic-design-template-vector-png-image_1497707.jpg" height="100" width="100" id="human">
  </body>
  
  <script>
      function function1() {
        document.getElementById("image").style.animationPlayState = 'running';

        setTimeout(function() {
            document.getElementById("human").style.animationPlayState = 'running';
            setTimeout(function() {
                document.getElementById("human").style.opacity = "0";
            }, 900);
        }, 900);
    
      }
  </script>
  
  <style>
    #image {
        animation-play-state: paused;
        height: 300px;
        width: 300px;
        position: relative;
        animation-name: frem-og-tilbake;
        animation-duration: 2s;
        animation-iteration-count: 1;
        animation-direction: normal;
        left: 0px;
        top: 10px;
    }    
    @keyframes frem-og-tilbake {
        0% {
            left: 0px;
            top: 10px; 
        }
        50% {
            left: 500px;
            top: 10px;    
        }
        100% {
            left: 0px;
            top: 10px;
        }
    }
    #human {
        position: fixed;
        left: 400px;
        top: 10px;

        animation-play-state: paused;
        height: 200px;
        width: 200px;
        position: relative;
        animation-name: human;
        animation-duration: 1s;
        animation-iteration-count: 1;
        animation-direction: normal;  
    }
    @keyframes human {
        0% {
            left: 400px;
            top: 10px;
        }
        50% {
            left: 400px;
            top: 40px;
            transform: rotate(90deg);
            background-color: red;
        }
        100% {
            opacity: 0;
            left: 400px;
            top: 40px;
            transform: rotate(90deg);
        }

    }
  </style>
  
</html>
